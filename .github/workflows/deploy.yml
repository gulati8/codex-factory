name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Trigger EC2 deploy over SSM
        id: deploy
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          REPO_URL: https://github.com/gulati8/codex-factory.git
        run: |
          set -euo pipefail
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[\"export REPO_URL=$REPO_URL\",\"export BRANCH=main\",\"bash /srv/codex-factory/repo/deploy/server-deploy.sh || (rm -rf /srv/codex-factory/repo && git clone --branch main --single-branch $REPO_URL /srv/codex-factory/repo && bash /srv/codex-factory/repo/deploy/server-deploy.sh)\"]" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

      - name: Print deploy logs
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
        run: |
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" \
            --output text
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardErrorContent" \
            --output text
